name: ProductionOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Validate plugin structure
        run: bun run skill:check

      - name: Validate agents
        run: bun run validate

      - name: Validate schemas (marketplace, plugin, hooks)
        run: bun test tests/schema-validation.test.ts

      - name: Run tests (0 failures required)
        run: |
          OUTPUT=$(bun test 2>&1) || true
          echo "$OUTPUT"
          FAIL_COUNT=$(echo "$OUTPUT" | grep -oE '[0-9]+ fail' | head -1 | grep -oE '[0-9]+' || echo "0")
          PASS_COUNT=$(echo "$OUTPUT" | grep -oE '[0-9]+ pass' | head -1 | grep -oE '[0-9]+' || echo "0")
          echo "Tests: $PASS_COUNT pass, $FAIL_COUNT fail"
          if [ "${FAIL_COUNT:-0}" -gt 0 ]; then
            echo "::error::Test failures detected. 0 failures required."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check (strict)
        run: |
          OUTPUT=$(./node_modules/.bin/tsc --noEmit 2>&1)
          if [ $? -ne 0 ]; then
            echo "$OUTPUT"
            echo "::error::TypeScript errors found. 0 errors required."
            exit 1
          fi
          echo "TypeScript: 0 errors"

  eval-gate:
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Run eval (10/10 target, 0 critical findings)
        run: |
          OUTPUT=$(bun run eval 2>&1) || true
          echo "$OUTPUT"
          SCORE=$(echo "$OUTPUT" | grep "OVERALL" | grep -oE '[0-9]+\.[0-9]+' | head -1 || echo "0")
          CRITICAL=$(echo "$OUTPUT" | grep "Total:" | grep -oE '[0-9]+ critical' | head -1 | grep -oE '[0-9]+' || echo "0")
          echo ""
          echo "Eval score: $SCORE/10"
          echo "Critical findings: $CRITICAL"
          if [ "${CRITICAL:-0}" -gt 0 ]; then
            echo "::error::Critical findings detected. 0 critical findings required."
            exit 1
          fi
          echo "Eval gate passed (score: $SCORE/10, 0 critical findings)"

  convergence-check:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Verify convergence engine
        run: bun run scripts/convergence.ts --test

  codex-install:
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Validate Codex installer and runtime target generation
        run: bun test tests/installer.test.ts tests/runtime-targets.test.ts tests/skill-validation.test.ts
